<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <link href="personalicss.css" rel="stylesheet">
        
        <title>Tareas</title>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
      </head>
<body>
    

    <div class="container my-5 p-5">
<h1 class="text-center mb-4">Tablero de Actividades</h1>
      
      <!-- Tareas pendientes -->
      <div class="task-cards">
        <div class="task-card">
          <div class="task-title">Revisar reportes mensuales</div>
          <div class="task-status">Estado: Pendiente</div>
          <button class="btn btn-sm btn-primary mt-2">Marcar como completado</button>
        </div>

        <!-- Tarea completada -->
        <div class="task-card completed">
          <div class="task-title">Enviar propuesta al cliente</div>
          <div class="task-status">Estado: Completado</div>
        </div>

        <!-- Otra tarea pendiente -->
        <div class="task-card">
          <div class="task-title">Planificar la reunión semanal</div>
          <div class="task-status">Estado: Pendiente</div>
          <button class="btn btn-sm btn-primary mt-2">Marcar como completado</button>
        </div>
      </div>
</div>
      <script>
      document.querySelectorAll('.btn-primary').forEach(button => {
        button.addEventListener('click', function() {
          const taskCard = this.closest('.task-card');
          taskCard.classList.add('completed');
          taskCard.querySelector('.task-status').textContent = 'Estado: Completado';
          taskCard.style.borderLeftColor = '#198754';
          taskCard.style.backgroundColor = '#e9f7ec';
          this.remove();
        });
      });
    </script>
</body>
</html>
