          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
          <div class="offcanvas-header bg-colpurple-400">
            <h5 class="offcanvas-title text-light" id="offcanvasNavbarLabel">TransferBox</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
          </div>
          <div class="offcanvas-body bg-light">
            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
              <li class="nav-item">
                <a class="nav-link" href="#" onclick="cargarIframe('inicio')">Inicio</a>
              </li>
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Personal
                </a>
                <ul class="dropdown-menu">
                  <li class="nav-item dropdown">
                  <li><a class="dropdown-item" href="#" onclick="cargarIframe('mercadolibre')">Mercado Libre</a></li>
                  </li>
                </li>
                  <hr class="dropdown-divider">
                  <li><a class="dropdown-item" href="#" onclick="cargarIframe('amazon')">Amazon</a></li>
                  <li>
                    <hr class="dropdown-divider">
                  </li>
                  <li><a class="dropdown-item" href="#" onclick="cargarIframe('administrativo')">Administrativo</a></li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Unidades</a>

    <div class="container my-5 p-3">
      <!-- iframe donde se cargará el contenido -->
      <iframe id="content-frame" src="tarea.html" style="position: absolute; top: 0; left: 0; width: 100%; height: 100vh; border: none;"></iframe>
    </div>

    
    <!-- End Example Code -->
  </body>
  <script>
    // Función para cargar diferentes páginas dentro del iframe
    function cargarIframe(pagina) {
      let iframe = document.getElementById("content-frame");
      
      // Cambiar el src del iframe según la opción seleccionada
      if (pagina === 'mercadolibre') {
        iframe.src = "personal.html"; // URL de Mercado Libre
      } else if (pagina === 'amazon') {
        iframe.src = "https://www.amazon.com.mx/?tag=msndeskabkmx-20&ref=pd_sl_7q4oo91e8o_e&adgrpid=1161084699046438&hvadid=72568048927387&hvnetw=o&hvqmt=e&hvbmt=be&hvdev=c&hvlocint=&hvlocphy=166066&hvtargid=kwd-72568144493216:loc-119&hydadcr=13958_13417251"; // URL de Amazon
      } else if (pagina === 'administrativo') {
        iframe.src = "https://www.example.com"; // URL de la sección Administrativo (puedes poner la URL que desees)
      } else if (pagina === 'inicio') {
        iframe.src = "tarea.html"; // URL de la sección Administrativo (puedes poner la URL que desees)
      }
    }

  </script>
